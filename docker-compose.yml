version: "3.8"
services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    ports: ["8001:8000"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/data/uploads
      - RESULT_DIR=/data/results
    volumes:
      - ./data:/data
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on: [redis]

  worker:
    build: ./backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - UPLOAD_DIR=/data/uploads
      - RESULT_DIR=/data/results
    volumes:
      - ./data:/data
      - ./backend/app:/app/app
    command: celery -A app.tasks worker --loglevel=info --pool=solo
    depends_on: [redis]

  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host
    depends_on: [backend]
